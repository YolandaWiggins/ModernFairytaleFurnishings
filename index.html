<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Fairytale Furnishings</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f4f4;color:#333}
header{background:#5a4bff;color:white;padding:20px;text-align:center}
nav{margin:10px 0}
nav button{margin:0 5px;padding:10px 15px;border:none;border-radius:6px;cursor:pointer}
.section{padding:40px;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:20px}
.card{background:white;padding:15px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
.card button{margin-top:10px;padding:8px 12px;border:none;background:#5a4bff;color:white;border-radius:6px;cursor:pointer}
#productSection,.cart-section,.subscribe-section{display:none}
.cart{position:fixed;right:0;top:60px;width:300px;background:white;height:100%;box-shadow:-4px 0 15px rgba(0,0,0,0.2);padding:15px;overflow:auto;transition:0.3s;z-index:10}
.cart h3{text-align:center;margin-top:0}
.cart-item{border-bottom:1px solid #ddd;padding:8px 0}
.cart button{margin-top:10px;width:100%}
.subscribe-section input{width:80%;padding:10px;margin:5px 0;border-radius:6px;border:1px solid #ccc}
.subscribe-section button{padding:10px 20px;border:none;background:#5a4bff;color:white;border-radius:6px;cursor:pointer;margin-top:5px}
footer{background:#111;color:white;padding:20px;text-align:center;margin-top:40px}
</style>
</head>
<body>

<header>
<h1>Modern Fairytale Furnishings</h1>
<nav>
<button onclick="showHome()">Home</button>
<button onclick="showCategory('bedroom')">Bedroom</button>
<button onclick="showCategory('living')">Living Room</button>
<button onclick="showCategory('dining')">Dining Room</button>
<button onclick="showCategory('theater')">Home Theater</button>
<button onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
</nav>
</header>

<section class="section" id="homeSection">
<h2>Welcome to Modern Fairytale Furnishings</h2>
<p>Luxury furniture for every room + protection plans for peace of mind.</p>
</section>

<section class="section" id="productSection">
<h2 id="categoryTitle"></h2>
<div class="grid" id="productGrid"></div>
<button onclick="showHome()">Back to Home</button>
</section>

<div class="cart" id="cartPanel">
<h3>Shopping Cart</h3>
<div id="cartItems"></div>
<p>Total: $<span id="cartTotal">0</span></p>
<button onclick="checkout()">Checkout</button>
</div>

<section class="section subscribe-section" id="subscribeSection">
<h2>Join Our Mailing List</h2>
<input type="text" placeholder="Full Name" id="subName"><br>
<input type="text" placeholder="Address" id="subAddress"><br>
<input type="email" placeholder="Email" id="subEmail"><br>
<button onclick="subscribe()">Subscribe</button>
</section>

<footer>
<p>© 2026 Modern Fairytale Furnishings</p>
</footer>

<script>
const products = {
  bedroom:[{name:'Luxury King Bed',price:1299},{name:'Modern Nightstand',price:199},{name:'Wood Dresser',price:599}],
  living:[{name:'Leather Sofa',price:999},{name:'Recliner Chair',price:499},{name:'Coffee Table',price:249}],
  dining:[{name:'Dining Table Set',price:899},{name:'Dining Chairs',price:299},{name:'Buffet Cabinet',price:699}],
  theater:[{name:'Power Recliner',price:799},{name:'Theater Seating Row',price:1999},{name:'Media Console',price:499}]
};

const plans=[
  {name:'Good',percent:0.08},
  {name:'Better',percent:0.12},
  {name:'Best',percent:0.16}
];

let cart=[];

function showCategory(cat){
  document.getElementById('homeSection').style.display='none';
  document.getElementById('subscribeSection').style.display='block';
  document.getElementById('productSection').style.display='block';
  const grid=document.getElementById('productGrid');
  grid.innerHTML='';
  document.getElementById('categoryTitle').innerText=cat.charAt(0).toUpperCase()+cat.slice(1)+' Furniture';
  products[cat].forEach(p=>{
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`<h3>${p.name}</h3><p>$${p.price}</p><button onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>`;
    grid.appendChild(div);
  });
}

function showHome(){
  document.getElementById('homeSection').style.display='block';
  document.getElementById('productSection').style.display='none';
  document.getElementById('subscribeSection').style.display='block';
}

function addToCart(item){
  cart.push({item:item,plan:null});
  updateCart();
}

function updateCart(){
  const cartDiv=document.getElementById('cartItems');
  cartDiv.innerHTML='';
  let total=0;
  cart.forEach((c,i)=>{
    let planButtons='';
    plans.forEach(p=>{
      planButtons+=`<button onclick='setPlan(${i},"${p.name}",${p.percent})'>${p.name}</button>`;
    });
    cartDiv.innerHTML+=`<div class='cart-item'><strong>${c.item.name}</strong> $${c.item.price}<br>Plan: ${c.plan?c.plan.name:'None'}<br>${planButtons}</div>`;
    total+=c.item.price + (c.plan?c.item.price*c.plan.percent:0);
  });
  document.getElementById('cartTotal').innerText=total.toFixed(2);
  document.getElementById('cartCount').innerText=cart.length;
}

function setPlan(index,name,percent){
  cart[index].plan={name:name,percent:percent};
  updateCart();
}

function toggleCart(){
  const panel=document.getElementById('cartPanel');
  panel.style.right=(panel.style.right==='0px'?'':'0px');
}

function checkout(){
  alert('Checkout Total: $'+document.getElementById('cartTotal').innerText+'\nThank you for your purchase!');
  cart=[];
  updateCart();
}

function subscribe(){
  const name=document.getElementById('subName').value;
  const address=document.getElementById('subAddress').value;
  const email=document.getElementById('subEmail').value;
  if(name && address && email){
    alert('Thanks '+name+'! You are now subscribed.');
    document.getElementById('subName').value='';
    document.getElementById('subAddress').value='';
    document.getElementById('subEmail').value='';
  } else alert('Please fill out all fields.');
}
</script>

</body>
</html>
